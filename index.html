<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="hero-panel">
            <div class="hero-branding">
                <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="brand-logo">
                <div>
                    <h1 class="game-title">Water Drop Rescue</h1>
                    <p class="game-tagline">Collect clean drops and cans while avoiding dirty water to bring hope to every tap.</p>
                </div>
            </div>
            <div class="goal-badge">Goal: 20 points</div>
        </header>

        <div class="score-panel">
            <div class="score-item">Score: <span id="score">0</span></div>
            <div class="score-item">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start</button>
            <button id="reset-btn" class="secondary-btn">Reset</button>
        </div>

        <div id="game-message" class="game-message">Tap every clean drop before it reaches the ground.</div>

        <div id="game-container" class="game-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
